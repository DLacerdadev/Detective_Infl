kind = "web"
previewPath = "/"
title = "Ordo Realitas"
version = "1.0.0"
id = "artifacts/ordo-realitas"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 21616
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/ordo-realitas run dev"

[services.env]
PORT = "21616"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/ordo-realitas", "run", "build"]
publicDir = "artifacts/ordo-realitas/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
